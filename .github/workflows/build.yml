name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & test on macOS
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show toolchain
        run: |
          swift --version
          xcrun --find xctest

      - name: Build
        run: swift build -c release --enable-test-discovery

      - name: Test
        run: swift test --enable-test-discovery
